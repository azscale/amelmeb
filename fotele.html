<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AmelMeb - Katalog Foteli Tapicerowanych</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
       <link rel="stylesheet" href="style1.css">

</head>
<body>

    <header>
        <nav>
            <div class="logo">
                <a href="#"><img src="logo.png" alt="AmelMeb Logo"></a>
            </div>
            <div class="menu-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
            <div class="nav-menu" id="nav-links"> 
                <ul>
                    <li><a href="/amelmeb/index.html">Start</a></li>
                    <li><a href="#katalog">Produkty</a></li>
                    <li><a href="/amelmeb/index.html">O nas</a></li>
                    <li><a href="/amelmeb/index.html">Kontakt</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="section-padding reveal" id="katalog">
        <h2 style="font-family: 'Playfair Display', serif; font-size: 2.5rem;">Kolekcja Foteli</h2>
        <p style="color: #666; margin-top: 10px;">Idealne dopełnienie Twojego wnętrza</p>
        <div style="width: 50px; height: 3px; background: var(--primary-red); margin: 20px auto 40px;"></div>
        
        <div class="product-grid">
            <div class="product-card" onclick="openLightbox('https://images.unsplash.com/photo-1592078615290-033ee584e267?auto=format&fit=crop&w=1200&q=80', 'Fotel Wingback')">
                <div class="img-box">
                    <img src="https://images.unsplash.com/photo-1592078615290-033ee584e267?auto=format&fit=crop&w=600&q=80" alt="Fotel Uszak">
                    <div class="card-overlay"><div class="zoom-icon">Podgląd</div></div>
                </div>
                <h3>Klasyczny Uszak</h3>
            </div>

            <div class="product-card" onclick="openLightbox('https://images.unsplash.com/photo-1586023492125-27b2c045efd7?auto=format&fit=crop&w=1200&q=80', 'Fotel Velvet Rose')">
                <div class="img-box">
                    <img src="https://images.unsplash.com/photo-1586023492125-27b2c045efd7?auto=format&fit=crop&w=600&q=80" alt="Fotel Aksamitny">
                    <div class="card-overlay"><div class="zoom-icon">Podgląd</div></div>
                </div>
                <h3>Velvet Rose</h3>
            </div>

            <div class="product-card" onclick="openLightbox('https://images.unsplash.com/photo-1567016432779-094069958ea5?auto=format&fit=crop&w=1200&q=80', 'Fotel Lounge Grey')">
                <div class="img-box">
                    <img src="https://images.unsplash.com/photo-1567016432779-094069958ea5?auto=format&fit=crop&w=600&q=80" alt="Fotel Nowoczesny">
                    <div class="card-overlay"><div class="zoom-icon">Podgląd</div></div>
                </div>
                <h3>Lounge Grey</h3>
            </div>
        </div>
    </main>

    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <img src="" id="lightbox-img">
    </div>

    <footer>
        <p>&copy; 2026 AmelMeb - Meble Tapicerowane</p> <br>
        <p><a href="https://azscale.github.io/portfolio">Projekt i wykonanie: AZScale</a></p>
    </footer>

    <script>
        const menuBtn = document.querySelector('#mobile-menu');
        const navMenu = document.querySelector('#nav-links');
        const navLinks = document.querySelectorAll('#nav-links a');

        menuBtn.addEventListener('click', () => {
            menuBtn.classList.toggle('is-active');
            navMenu.classList.toggle('active');
        });

        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                menuBtn.classList.remove('is-active');
                navMenu.classList.remove('active');
            });
        });

        function openLightbox(src, alt) {
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = src;
            lb.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            for (var i = 0; i < reveals.length; i++) {
                var windowHeight = window.innerHeight;
                var elementTop = reveals[i].getBoundingClientRect().top;
                if (elementTop < windowHeight - 150) {
                    reveals[i].classList.add("active");
                }
            }
        }
        window.addEventListener("scroll", reveal);
        reveal();
    </script>
</body>
</html>
